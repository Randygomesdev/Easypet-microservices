<dialog id="medication_modal" class="modal">
  <div class="modal-box max-w-2xl border-t-8 border-orange-400">
    <h3 class="font-black text-2xl text-orange-600 mb-6 flex items-center gap-2">
      💊 {{ isEditMode() ? 'Editar Medicamento' : 'Novo Medicamento' }}
    </h3>

    <form [formGroup]="medForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- NOME -->
      <div class="form-control w-full">
        <label class="label"><span class="label-text font-bold">Medicamento</span></label>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="Ex: Apoquel, Bravecto, Amoxicilina" 
          class="input input-bordered w-full" 
          [class.input-error]="medForm.get('name')?.invalid && medForm.get('name')?.touched"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- DOSAGEM -->
        <div class="form-control w-full">
          <label class="label"><span class="label-text font-bold">Dosagem</span></label>
          <input type="text" formControlName="dosage" placeholder="Ex: 5mg, 2ml, 1 comprimido" class="input input-bordered w-full" />
        </div>

        <!-- FREQUÊNCIA -->
        <div class="form-control w-full">
          <label class="label"><span class="label-text font-bold">Frequência</span></label>
          <input type="text" formControlName="frequency" placeholder="Ex: 12/12h, 1x ao dia" class="input input-bordered w-full" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control w-full">
          <label class="label"><span class="label-text font-bold">Data de Início</span></label>
          <input type="date" formControlName="startDate" class="input input-bordered w-full" />
        </div>
        <div class="form-control w-full">
          <label class="label"><span class="label-text font-bold text-base-content/40">Data de Término (Opcional)</span></label>
          <input type="date" formControlName="endDate" class="input input-bordered w-full" />
        </div>
      </div>

      <div class="form-control w-full">
        <label class="label"><span class="label-text font-bold">Observações</span></label>
        <textarea formControlName="observations" class="textarea textarea-bordered h-24" placeholder="Alguma instrução especial?"></textarea>
      </div>

      <div class="modal-action flex justify-between items-center mt-8">
        <button type="button" class="btn btn-ghost" (click)="closeModal()">Cancelar</button>
        <button 
          type="submit" 
          class="btn btn-warning px-8 text-white shadow-md hover:shadow-lg transition-all" 
          [disabled]="medForm.invalid || loading()"
        >
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          Registrar Medicamento
        </button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button (click)="closeModal()">close</button>
  </form>
</dialog>
