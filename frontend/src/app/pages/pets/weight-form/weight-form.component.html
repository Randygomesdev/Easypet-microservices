<dialog id="weight_modal" class="modal">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-black text-2xl text-primary">⚖️ Registrar Nova Pesagem</h3>
      <button class="btn btn-sm btn-circle btn-ghost" (click)="closeModal()">✕</button>
    </div>

    <form [formGroup]="weightForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- PESO -->
      <div class="form-control w-full">
        <label class="label">
          <span class="label-text font-bold">Peso (kg)</span>
        </label>
        <input 
          type="number" 
          step="0.1"
          formControlName="weight" 
          placeholder="Ex: 12,5" 
          class="input input-bordered w-full text-lg" 
          [class.input-error]="weightForm.get('weight')?.invalid && weightForm.get('weight')?.touched"
        />
        @if (weightForm.get('weight')?.invalid && weightForm.get('weight')?.touched) {
          <label class="label">
            <span class="label-text-alt text-error font-medium">O peso deve ser maior que 0,1 kg</span>
          </label>
        }
      </div>

      <!-- DATA -->
      <div class="form-control w-full">
        <label class="label">
          <span class="label-text font-bold">Data da Pesagem</span>
        </label>
        <input 
          type="date" 
          formControlName="date" 
          class="input input-bordered w-full"
          [class.input-error]="weightForm.get('date')?.invalid && weightForm.get('date')?.touched"
        />
      </div>

      <div class="modal-action flex justify-between items-center">
        <button type="button" class="btn btn-ghost" (click)="closeModal()">Cancelar</button>
        <button 
          type="submit" 
          class="btn btn-primary px-8" 
          [disabled]="weightForm.invalid || loading()"
        >
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          Salvar Pesagem
        </button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button (click)="closeModal()">close</button>
  </form>
</dialog>
