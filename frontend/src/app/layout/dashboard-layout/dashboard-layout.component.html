<div class="drawer lg:drawer-open border-red-500">
  <input id="main-drawer" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col bg-base-200 min-h-screen">
    <!-- Navbar Superior Global -->
    <div class="navbar bg-base-100 shadow-sm border-b border-base-300">
      <div class="flex-none lg:hidden">
        <label for="main-drawer" class="btn btn-square btn-ghost drawer-button">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </label>
      </div>
      <div class="flex-1 px-2 mx-2 font-bold text-primary lg:hidden">Easypet 🐾</div>
      <div class="flex-1 hidden lg:flex"></div>

      <div class="flex-none gap-2">
        <!-- Theme Toggle -->
        <label class="cursor-pointer grid place-items-center">
          <input type="checkbox" [checked]="theme() === 'dark'" (change)="toggleTheme()" class="toggle bg-base-content row-start-1 col-start-1 col-span-2"/>
          <svg class="col-start-1 row-start-1 stroke-base-100 fill-base-100" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg class="col-start-2 row-start-1 stroke-base-100 fill-base-100" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </label>

        <!-- User Menu -->
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
            @if(userPicture()) {
              <div class="w-10 rounded-full shadow-sm border-2 border-transparent hover:border-primary transition-all">
                <img [src]="userPicture()" alt="User Avatar" referrerpolicy="no-referrer" (error)="userPicture.set(null)" />
              </div>
            } @else {
              <div class="bg-primary text-primary-content rounded-full w-10 shadow-sm border-2 border-transparent hover:border-primary-focus transition-all placeholder flex items-center justify-center">
                <span class="text-xl font-bold">{{ userInitial() }}</span>
              </div>
            }
          </div>
          <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow-lg bg-base-100 rounded-box w-52 border border-base-300">
            <li class="menu-title text-base-content font-semibold border-b border-base-200 pb-2 mb-1">
              Olá, {{ userName() }}
            </li>
            <li><a>Editar Perfil</a></li>
            <li class="text-error mt-1"><a (click)="onLogout()">Sair</a></li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Conteúdo da Página -->
    <main class="p-4 lg:p-8 flex-grow">
      <router-outlet></router-outlet>
    </main>
  </div> 

  <!-- Sidebar -->
  <div class="drawer-side border-r border-base-300">
    <label for="main-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <ul class="menu p-4 w-80 min-h-full bg-base-100 text-base-content flex flex-col">
      <li class="mb-8 px-4 py-2 text-2xl font-bold text-primary flex flex-row items-center gap-2">
        <span class="text-3xl">🐾</span> Easypet
      </li>
      
      <li>
        <a routerLink="/pets" routerLinkActive="active" class="flex gap-3 text-lg py-3">
          <span>🐶</span> Meus Pets
        </a>
      </li>
      
    </ul>
  </div>
</div>
