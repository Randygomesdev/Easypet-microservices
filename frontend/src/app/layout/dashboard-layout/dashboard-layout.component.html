<div class="drawer lg:drawer-open border-red-500">
  <input id="main-drawer" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col bg-base-200 min-h-screen">
    <!-- Navbar Mobile -->
    <div class="navbar bg-base-100 shadow-sm lg:hidden">
      <div class="flex-none">
        <label for="main-drawer" class="btn btn-square btn-ghost drawer-button">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </label>
      </div>
      <div class="flex-1 px-2 mx-2 font-bold text-primary">Easypet 🐾</div>
    </div>

    <!-- Conteúdo da Página -->
    <main class="p-4 lg:p-8 flex-grow">
      <router-outlet></router-outlet>
    </main>
  </div> 

  <!-- Sidebar -->
  <div class="drawer-side border-r border-base-300">
    <label for="main-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <ul class="menu p-4 w-80 min-h-full bg-base-100 text-base-content flex flex-col">
      <li class="mb-8 px-4 py-2 text-2xl font-bold text-primary flex flex-row items-center gap-2">
        <span class="text-3xl">🐾</span> Easypet
      </li>
      
      <li>
        <a routerLink="/pets" routerLinkActive="active" class="flex gap-3 text-lg py-3">
          <span>🐶</span> Meus Pets
        </a>
      </li>
      
      <li class="mt-auto">
        <a (click)="onLogout()" class="text-error flex gap-3 text-lg py-3">
          <span>🚪</span> Sair
        </a>
      </li>
    </ul>
  </div>
</div>
