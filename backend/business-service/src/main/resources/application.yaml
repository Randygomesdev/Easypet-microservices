server:
  port: 8082
  servlet:
    context-path: /api/v1

spring:
  application:
    name: business-service

  datasource:
    url: jdbc:postgresql://localhost:5433/business_db
    username: admin
    password: admin_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
